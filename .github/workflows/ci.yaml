name: CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        type: string
        default: "lts/*"
        required: false
      build:
        description: "Run the build step"
        type: boolean
        default: true
        required: false
      build-script:
        description: "Arguments passed to pnpm for the build step"
        type: string
        default: "build"
        required: false
      lint:
        description: "Run the lint step"
        type: boolean
        default: true
        required: false
      lint-script:
        description: "Arguments passed to pnpm for the lint step"
        type: string
        default: "lint"
        required: false
      fmt:
        description: "Run the fmt step"
        type: boolean
        default: false
        required: false
      fmt-script:
        description: "Arguments passed to pnpm for the fmt step"
        type: string
        default: "fmt"
        required: false
      typecheck:
        description: "Run the typecheck step"
        type: boolean
        default: true
        required: false
      typecheck-script:
        description: "Arguments passed to pnpm for the typecheck step"
        type: string
        default: "typecheck"
        required: false
      persist-credentials:
        description: "Whether to persist git credentials after checkout"
        type: boolean
        default: false
        required: false
      fetch-depth:
        description: "Number of commits to fetch (0 for full history)"
        type: number
        default: 1
        required: false
      submodules:
        description: "Whether to checkout submodules: `true` to checkout submodules or `recursive` to recursively checkout submodules"
        type: string
        default: "false"
        required: false
      node-version-file:
        description: "File containing the version spec (e.g. .nvmrc, .node-version, package.json)"
        type: string
        default: ""
        required: false
      registry-url:
        description: "Registry URL to configure for authentication (e.g. https://npm.pkg.github.com)"
        type: string
        default: ""
        required: false
      scope:
        description: "Scope for authenticating against scoped registries (e.g. @myorg)"
        type: string
        default: ""
        required: false
      install-args:
        description: "Additional arguments to pass to pnpm install"
        type: string
        default: ""
        required: false
    secrets:
      token:
        description: "GitHub token to use for checkout (defaults to GITHUB_TOKEN)"
        required: false

permissions: {}

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: setup
        uses: luxass/shared-workflows/actions/setup@554e26b2e40b5deab8185f0f1f0259ac1b33c252 # v0.2.0
        with:
          node-version: ${{ inputs.node-version }}
          node-version-file: ${{ inputs.node-version-file }}
          registry-url: ${{ inputs.registry-url }}
          scope: ${{ inputs.scope }}
          token: ${{ secrets.token || github.token }}
          persist-credentials: ${{ inputs.persist-credentials }}
          fetch-depth: ${{ inputs.fetch-depth }}
          submodules: ${{ inputs.submodules }}
          install-args: ${{ inputs.install-args }}

      - name: build
        if: ${{ inputs.build }}
        env:
          BUILD_SCRIPT: ${{ inputs.build-script }}
        run: pnpm $BUILD_SCRIPT

      - name: lint
        if: ${{ inputs.lint }}
        env:
          LINT_SCRIPT: ${{ inputs.lint-script }}
        run: pnpm $LINT_SCRIPT

      - name: fmt
        if: ${{ inputs.fmt }}
        env:
          FMT_SCRIPT: ${{ inputs.fmt-script }}
        run: pnpm $FMT_SCRIPT

      - name: typecheck
        if: ${{ inputs.typecheck }}
        env:
          TYPECHECK_SCRIPT: ${{ inputs.typecheck-script }}
        run: pnpm $TYPECHECK_SCRIPT
